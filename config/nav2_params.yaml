# Drone New Method — Nav2 Parameters (Phase 0)
# Used only for transit navigation between aisles, not inside aisles

nav2_config:
  ros__parameters:
    robot_radius: 0.25
    inflation_radius: 0.35
    max_vel_x: 1.0
    min_vel_x: 0.1
    max_vel_theta: 1.0
    controller_frequency: 20.0
    planner_frequency: 1.0
